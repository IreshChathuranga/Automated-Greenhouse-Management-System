server:
  port: 8083

spring:
  application:
    name: automation-service

  config:
    import: optional:configserver:http://localhost:8888

  datasource:
    url: ${AUTOMATION_DB_URL:jdbc:mysql://localhost:3306/automation_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${AUTOMATION_DB_USERNAME:root}
    password: ${AUTOMATION_DB_PASSWORD:Ijse@123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
